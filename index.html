<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMATh WORLD — Content-Driven, AI-Powered</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;1,400&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-bg: #03071e;
      --color-surface: rgba(255, 255, 255, 0.04);
      --color-border: rgba(255, 255, 255, 0.1);
      --color-text-primary: #e1e3e1;
      --color-text-muted: rgba(255, 255, 255, 0.6);
      --color-accent: #8273ff;
      --color-cta: #523dff;
      --color-cta-hover: #6a55ff;
      --font-display: 'Newsreader', Georgia, serif;
      --font-ui: 'Manrope', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── LAYOUT ─────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* ─── BACKGROUND GRADIENTS ───────────────────── */
    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 11% at 50% 50%, rgba(76, 0, 255, 0.22) 0%, transparent 100%),
        radial-gradient(ellipse 52% 15% at 20% 30%, rgba(0, 242, 255, 0.11) 0%, transparent 100%),
        radial-gradient(ellipse 52% 15% at 80% 70%, rgba(255, 0, 221, 0.13) 0%, transparent 100%),
        linear-gradient(135deg, #03071e 0%, #070b2a 50%, #03071e 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER / NAV ───────────────────────────── */
    .header {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 80px;
      gap: 40px;
    }

    .logo img {
      height: 21px;
      width: auto;
      display: block;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 30px;
      list-style: none;
    }

    .nav a {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 16px;
      color: var(--color-text-primary);
      text-decoration: none;
      transition: color 0.2s ease, opacity 0.2s ease;
      position: relative;
    }

    .nav a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 1.5px;
      background: var(--color-accent);
      transition: width 0.25s ease;
    }

    .nav a:hover {
      color: var(--color-accent);
    }

    .nav a:hover::after {
      width: 100%;
    }

    /* ─── BUTTON ──────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: var(--color-cta);
      color: #fff;
      font-family: var(--font-ui);
      font-weight: 800;
      font-size: 16px;
      text-decoration: none;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn:hover {
      background: var(--color-cta-hover);
      box-shadow: 0 0 24px rgba(82, 61, 255, 0.5);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn--lg {
      padding: 16px 32px;
      font-size: 18px;
    }

    .btn-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ─── ARC GALLERY ────────────────────────────── */
    .arc-gallery {
      position: relative;
      z-index: 1;
      width: 1251px;
      height: 703px;
      flex-shrink: 0;
      margin-top: -8px;
    }

    .arc-card-wrapper {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .arc-card {
      background: rgba(255, 255, 255, 0);
      border: 1.07px solid var(--color-border);
      border-radius: 17px;
      width: 149px;
      height: 192px;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.6);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      cursor: pointer;
      flex-shrink: 0;
    }

    .arc-card:hover {
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(130, 115, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.25);
      transform: scale(1.04);
    }

    .arc-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* Card positions & rotations matching Figma */
    .arc-card-wrapper:nth-child(1) { left: 33px;  top: 494px; width: 202px; height: 163px; }
    .arc-card-wrapper:nth-child(1) .arc-card { transform: rotate(-86deg); }
    .arc-card-wrapper:nth-child(2) { left: 71px;  top: 267px; width: 240px; height: 223px; }
    .arc-card-wrapper:nth-child(2) .arc-card { transform: rotate(-62deg); }
    .arc-card-wrapper:nth-child(3) { left: 204px; top: 100px; width: 237px; height: 244px; }
    .arc-card-wrapper:nth-child(3) .arc-card { transform: rotate(-38deg); }
    .arc-card-wrapper:nth-child(4) { left: 411px; top: 21px;  width: 192px; height: 223px; }
    .arc-card-wrapper:nth-child(4) .arc-card { transform: rotate(-14deg); }
    .arc-card-wrapper:nth-child(5) { left: 649px; top: 21px;  width: 192px; height: 223px; }
    .arc-card-wrapper:nth-child(5) .arc-card { transform: rotate(14deg); }
    .arc-card-wrapper:nth-child(6) { left: 810px; top: 100px; width: 237px; height: 244px; }
    .arc-card-wrapper:nth-child(6) .arc-card { transform: rotate(38deg); }
    .arc-card-wrapper:nth-child(7) { left: 940px; top: 267px; width: 240px; height: 223px; }
    .arc-card-wrapper:nth-child(7) .arc-card { transform: rotate(62deg); }
    .arc-card-wrapper:nth-child(8) { left: 1015px; top: 494px; width: 203px; height: 163px; }
    .arc-card-wrapper:nth-child(8) .arc-card { transform: rotate(86deg); }

    /* ─── HERO CONTENT ───────────────────────────── */
    .hero-content {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      text-align: center;
      margin-top: -280px; /* overlap the arc gallery */
      padding: 0 20px;
      /* radial vignette behind text */
      background: radial-gradient(ellipse 654px 260px at center, rgba(3, 7, 30, 0.82) 0%, rgba(3, 7, 30, 0) 80%);
      padding: 60px 80px 0;
    }

    .headline {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .headline-line {
      font-family: var(--font-display);
      font-weight: 400;
      font-style: normal;
      font-size: 60px;
      line-height: 1.1;
      color: var(--color-text-primary);
    }

    .headline-italic {
      font-family: var(--font-display);
      font-weight: 400;
      font-style: italic;
      font-size: 48px;
      line-height: 1.2;
      color: var(--color-accent);
    }

    /* ─── BOTTOM INFO ────────────────────────────── */
    .hero-footer {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 630px;
      max-width: 100%;
      margin-top: 48px;
      padding-bottom: 60px;
    }

    .subtitle {
      font-family: var(--font-ui);
      font-weight: 300;
      font-size: 16px;
      line-height: 1.6;
      color: var(--color-text-primary);
      text-align: center;
      margin-bottom: 0;
    }

    .service-tags {
      display: flex;
      align-items: center;
      gap: 30px;
      padding: 13px 42px 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      width: 100%;
      margin-top: 20px;
    }

    .service-tag {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 14px;
      color: var(--color-accent);
      white-space: nowrap;
      cursor: pointer;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    .service-tag:hover {
      opacity: 0.75;
    }

    .service-divider {
      width: 1px;
      height: 24px;
      background: rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }

    /* ─── SCROLL HINT ────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--color-text-muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: fadeInUp 1s 1.5s both;
      z-index: 10;
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    /* ─── ANIMATIONS ──────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(16px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50%       { opacity: 1;   transform: scaleY(1.1); }
    }

    .fade-in {
      animation: fadeIn 0.9s ease both;
    }

    .fade-in-up {
      animation: fadeInUpSimple 0.9s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fadeInUpSimple {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .delay-1 { animation-delay: 0.15s; }
    .delay-2 { animation-delay: 0.3s; }
    .delay-3 { animation-delay: 0.5s; }
    .delay-4 { animation-delay: 0.7s; }
    .delay-5 { animation-delay: 0.9s; }

    /* ─── RESPONSIVE ─────────────────────────────── */
    @media (max-width: 1300px) {
      .arc-gallery {
        width: 100%;
        max-width: 1251px;
        transform: scale(0.85);
        transform-origin: top center;
        margin-bottom: -80px;
      }

      .header {
        padding: 20px 40px;
      }
    }

    @media (max-width: 900px) {
      .arc-gallery {
        transform: scale(0.55);
        transform-origin: top center;
        margin-bottom: -260px;
      }

      .hero-content {
        margin-top: -200px;
        padding: 40px 24px 0;
      }

      .headline-line { font-size: 40px; }
      .headline-italic { font-size: 32px; }

      .nav { display: none; }

      .hero-footer {
        width: 90%;
      }

      .service-tags {
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px 20px;
      }
    }

    @media (max-width: 600px) {
      .arc-gallery {
        transform: scale(0.38);
        transform-origin: top center;
        margin-bottom: -380px;
      }

      .hero-content {
        margin-top: -120px;
      }

      .headline-line { font-size: 32px; }
      .headline-italic { font-size: 26px; }

      .header {
        padding: 16px 20px;
        gap: 16px;
      }
    }
  </style>
</head>
<body>

    <!-- Background -->

      <div class="arc-card-wrapper">

    <!-- Hero Content (overlaps gallery bottom) -->
    <div class="hero-content">

    <!-- Footer Info -->

  </section>
</body>
</html>
