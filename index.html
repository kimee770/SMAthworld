        url("data:image/svg+xml,%3Csvg viewBox='0 0 1480 987' xmlns='http://www.w3.org/2000/svg' preserveAspectRatio='xMidYMid slice'%3E%3Crect width='100%25' height='100%25' fill='url(%23g3)'/%3E%3Cdefs%3E%3CradialGradient id='g3' gradientUnits='userSpaceOnUse' cx='0' cy='0' r='10' gradientTransform='matrix(380.83 0 0 72.693 1184 690.9)'%3E%3Cstop stop-color='rgba(255,0,221,0.13)' offset='0'/%3E%3Cstop stop-color='rgba(255,0,221,0)' offset='0.4'/%3E%3C/radialGradient%3E%3C/defs%3E%3C/svg%3E"),

    /* ── Fixed 1480×987 design canvas ── */
    #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 1480px;
      height: 987px;
      transform-origin: top left;
      background: transparent;
    }

       BACKGROUND GRADIENTS (canvas 내부용 — 제거됨)
    ══════════════════════════════════════ */
    .bg-layer {
      display: none;
      pointer-events: none;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 1480 987' xmlns='http://www.w3.org/2000/svg' preserveAspectRatio='none'%3E%3Crect width='100%25' height='100%25' fill='url(%23g1)'/%3E%3Cdefs%3E%3CradialGradient id='g1' gradientUnits='userSpaceOnUse' cx='0' cy='0' r='10' gradientTransform='matrix(268.92 0 0 51.332 740 493.5)'%3E%3Cstop stop-color='rgba(76,0,255,0.21)' offset='0'/%3E%3Cstop stop-color='rgba(76,0,255,0.02)' offset='0.5'/%3E%3C/radialGradient%3E%3C/defs%3E%3C/svg%3E"),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 1480 987' xmlns='http://www.w3.org/2000/svg' preserveAspectRatio='none'%3E%3Crect width='100%25' height='100%25' fill='url(%23g2)'/%3E%3Cdefs%3E%3CradialGradient id='g2' gradientUnits='userSpaceOnUse' cx='0' cy='0' r='10' gradientTransform='matrix(380.83 0 0 72.693 296 296.1)'%3E%3Cstop stop-color='rgba(0,242,255,0.11)' offset='0'/%3E%3Cstop stop-color='rgba(0,242,255,0)' offset='0.4'/%3E%3C/radialGradient%3E%3C/defs%3E%3C/svg%3E"),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 1480 987' xmlns='http://www.w3.org/2000/svg' preserveAspectRatio='none'%3E%3Crect width='100%25' height='100%25' fill='url(%23g3)'/%3E%3Cdefs%3E%3CradialGradient id='g3' gradientUnits='userSpaceOnUse' cx='0' cy='0' r='10' gradientTransform='matrix(380.83 0 0 72.693 1184 690.9)'%3E%3Cstop stop-color='rgba(255,0,221,0.13)' offset='0'/%3E%3Cstop stop-color='rgba(255,0,221,0)' offset='0.4'/%3E%3C/radialGradient%3E%3C/defs%3E%3C/svg%3E"),
        linear-gradient(90deg, rgb(3,7,30) 0%, rgb(3,7,30) 100%);
    }

    /* ══════════════════════════════════════
       HEADER
       Figma: left:50%, top:24px, w:1224px, translate(-50%,0)
    ══════════════════════════════════════ */
    .header {
      position: absolute;
      left: 50%;
      top: 24px;
      width: 1224px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    /* Logo: 212.985×20.995px */
    .logo {
      width: 212.985px;
      height: 20.995px;
      position: relative;
      flex-shrink: 0;
    }
    .logo img {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: left center;
    }

    /* Nav: 445.48px wide, items absolutely positioned */
    .nav {
      position: relative;
      width: 445.48px;
      height: 18px;
      flex-shrink: 0;
    }
    .nav a {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      font-size: 16px;
      line-height: 16px;
      color: #e1e3e1;
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .nav a:hover { color: #8273ff; }

    /* Exact Figma left offsets */
    .nav a:nth-child(1) { left: 0.48px; }    /* About */
    .nav a:nth-child(2) { left: 77.48px; }   /* Clients */
    .nav a:nth-child(3) { left: 162.48px; }  /* Services */
    .nav a:nth-child(4) { left: 258.48px; }  /* Portfolio */
    .nav a:nth-child(5) { left: 355.48px; }  /* Partnership */

    /* ══════════════════════════════════════
       BUTTON BASE
    ══════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12.01px;
      background: #523dff;
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      text-decoration: none;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .btn:hover {
      background: #6a55ff;
      box-shadow: 0 0 24px rgba(82,61,255,0.5);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }
    .btn-icon { width: 16px; height: 16px; display: block; flex-shrink: 0; }

    /* Header button: px-16, py-12, 16px font */
    .btn-header { padding: 12px 16px; font-size: 16px; line-height: 24px; }

    /* Hero button: px-32, py-16, 18px font */
    .btn-hero { padding: 16px 32px; font-size: 18px; line-height: 24px; }

    /* ══════════════════════════════════════
       ARC GALLERY CONTAINER
       Figma: left:calc(50%-1px), top:calc(50%-36px)
              w:1226px, h:703px, translate(-50%,-50%)
              overflow:clip
    ══════════════════════════════════════ */
    .arc-container {
      position: absolute;
      left: calc(50% - 1px);
      top: calc(50% - 36px);
      width: 1226px;
      height: 703px;
      transform: translate(-50%, -50%);
      overflow: hidden;
      z-index: 1;
    }

    /* Card wrapper: absolute, centers the rotated card */
    .arc-wrap {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Card: exact Figma 149.766×192.551px, border-radius:17.115px */
    .arc-card {
      width: 149.766px;
      height: 192.551px;
      border-radius: 17.115px;
      border: 1.07px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0);
      box-shadow: 0px 12.836px 34.23px 0px rgba(0,0,0,0.6);
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .arc-card:hover {
      box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(130,115,255,0.3);
      border-color: rgba(255,255,255,0.25);
    }
    .arc-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .c2 { left: 57.99px;  top: 267.49px; width: 240.318px; height: 222.624px; }
    .c2 .arc-card { transform: rotate(-62deg); }

    .c3 { left: 191.39px; top: 100.10px; width: 236.556px; height: 243.931px; }
    .c3 .arc-card { transform: rotate(-38deg); }

    .c4 { left: 397.61px; top:  20.84px; width: 191.899px; height: 223.057px; }
    .c4 .arc-card { transform: rotate(-14deg); }

    .c5 { left: 635.69px; top:  20.84px; width: 191.901px; height: 223.064px; }
    .c5 .arc-card { transform: rotate(14deg); }

    .c6 { left: 797.26px; top: 100.10px; width: 236.557px; height: 243.933px; }
    .c6 .arc-card { transform: rotate(38deg); }

    .c7 { left: 926.91px; top: 267.49px; width: 240.315px; height: 222.623px; }
    .c7 .arc-card { transform: rotate(62deg); }

    .c8 { left: 1002.20px; top: 494.07px; width: 202.529px; height: 162.833px; }
    .c8 .arc-card { transform: rotate(86deg); }

    /* ══════════════════════════════════════
       HEADLINE CONTENT
       Figma: left:50%, top:calc(50%+115.5px)
              w:654px, h:272px, translate(-50%,-50%)
              border-radius:200px
    ══════════════════════════════════════ */
    .headline-content {
      position: absolute;
      left: 50%;
      top: calc(50% + 115.5px);
      width: 654px;
      height: 272px;
      transform: translate(-50%, -50%);
      border-radius: 200px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 654 272' xmlns='http://www.w3.org/2000/svg' preserveAspectRatio='none'%3E%3Crect width='100%25' height='100%25' fill='url(%23hg)'/%3E%3Cdefs%3E%3CradialGradient id='hg' gradientUnits='userSpaceOnUse' cx='0' cy='0' r='10' gradientTransform='matrix(41.815 0 0 21.821 327 136)'%3E%3Cstop stop-color='rgba(3,7,30,0.8)' offset='0'/%3E%3Cstop stop-color='rgba(3,7,30,0)' offset='0.8'/%3E%3C/radialGradient%3E%3C/defs%3E%3C/svg%3E");
      z-index: 5;

      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .headline-lines {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 654px;
      text-align: center;
    }

    /* Newsreader Regular 60px, leading-none */
    .hl {

      font-style: normal;
      font-size: 60px;
      line-height: 1;
      color: #e1e3e1;
      width: 100%;
      text-align: center;

    /* Newsreader Italic 48px, color:#8273ff, leading-none */
    .hl-italic {

      font-size: 48px;
      line-height: 1;
      white-space: nowrap;
      color: #8273ff;
      width: 100%;
      text-align: center;
    }

    /* ══════════════════════════════════════
       BOTTOM INFO
       Figma: left:425px, top:809px, w:630px
              flex-col, gap:24px, items:center
    ══════════════════════════════════════ */
    .bottom-info {
      position: absolute;
      left: 425px;
      top: 809px;
      width: 630px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      z-index: 5;
    }

    /* Gothic A1 Light → Noto Sans KR 300, 20px, color:white, leading-none */

      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;

      line-height: 1;

    /* border-top, px:42, pt:13, pb:12, gap:30 */

    }

    .vdivider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
  </style>
</head>

    const canvas = document.getElementById('canvas');
    const DESIGN_W = 1480;
    const DESIGN_H = 987;

    function scaleCanvas() {
      const scaleX = window.innerWidth  / DESIGN_W;
      const scaleY = window.innerHeight / DESIGN_H;
      const scale  = Math.min(scaleX, scaleY);

      const offsetX = (window.innerWidth  - DESIGN_W * scale) / 2;
      const offsetY = (window.innerHeight - DESIGN_H * scale) / 2;

      canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }

    scaleCanvas();
    window.addEventListener('resize', scaleCanvas);
  </script>
</body>
</html>
